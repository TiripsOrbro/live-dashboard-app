<!DOCTYPE html>
<html lang="en" class="page-scroll">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#7a3eb1">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TBADash">
    <title>Sales Dashboard</title>
    <script>
        try {
            if (sessionStorage.getItem('dashboard-nav-transition') === 'from-stores') {
                document.documentElement.className += ' page-nav-enter-pending';
            }
        } catch (e) { /* ignore */ }
    </script>

    <!-- Styles -->
    <link rel="stylesheet" href="/styles/brand-mark.css">
    <link rel="stylesheet" href="/styles/loading-dots.css">
    <link rel="stylesheet" href="/styles/dashboard.css">
    <link rel="stylesheet" href="/styles/login.css">
    <link rel="stylesheet" href="/styles/page-transition.css">
    <link rel="stylesheet" href="/styles/nav-back.css">
    <link rel="stylesheet" href="/styles/mic.css">
    <link rel="stylesheet" href="/styles/account-modal.css">
    <link rel="stylesheet" href="/styles/admin-menu.css">
    <link rel="stylesheet" href="/styles/page-scroll.css">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/icon.svg">
</head>

<body>
    <script src="/scripts/brand-mark.js"></script>
    <script src="/scripts/loading-dots.js"></script>
    <script src="/scripts/page-transition.js"></script>
    <script>
        DashboardPageTransition.initEnterFade();
        DashboardPageTransition.installDashboardPagehide();
    </script>
    <script src="/scripts/welcome-overlay.js"></script>
    <!-- Main App Container -->
    <div id="app" class="app-boot-loading" aria-busy="true">
        <div class="loading-dots loading-dots--lg" role="status" aria-label="Loading dashboard">
            <span class="loading-dots__dot" aria-hidden="true"></span>
            <span class="loading-dots__dot" aria-hidden="true"></span>
            <span class="loading-dots__dot" aria-hidden="true"></span>
        </div>
    </div>

    <!-- Popup Container -->
    <div class="popup">
        <div class="popup-progress"></div>
        <div class="popup-inner">
            <div class="popup-icon"></div>
            <div class="popup-message"></div>
            <div class="popup-buttons">
                <button>Busy</button>
                <button>Quiet</button>
            </div>
        </div>
    </div>

    <!-- Popup Sound Effect -->
    <audio id="popup-sound" src="/assets/sounds/notification.mp3" preload="auto"></audio>

    <!-- Scripts -->
    <script src="/scripts/popup-timing.js"></script>
    <script src="/scripts/popup-content.js"></script>
    <script src="/scripts/nav-back.js"></script>
    <script src="/scripts/stock-count-notify.js"></script>
    <script src="/scripts/admin-store-tabs.js"></script>
    <script src="/scripts/admin-area-panel.js"></script>
    <script src="/scripts/admin-store-picker.js"></script>
    <script src="/scripts/app-paths.js"></script>
    <script src="/scripts/account-modal.js"></script>
    <script src="/scripts/admin-menu.js"></script>
    <script src="/scripts/admin-accounts.js"></script>
    <script src="/scripts/admin-forecast.js"></script>
    <script src="/scripts/admin-build-to.js"></script>
    <script src="/scripts/admin-store-picker.js"></script>
    <script src="/scripts/admin-scope-picker.js"></script>
    <script src="/scripts/admin-store-logins.js"></script>
    <script src="/scripts/admin-smg-nsf.js"></script>
    <script src="/scripts/dashboard-meta.js"></script>
    <script src="/scripts/audit-preferences.js"></script>
    <script src="/scripts/mic-settings.js"></script>
    <script src="/scripts/sales-progress.js"></script>
    <script src="/scripts/dashboard-data-cache.js"></script>
    <script src="/scripts/mic-mini-dashboard.js"></script>
    <script src="/scripts/dashboard.js"></script>
</body>
</html>
