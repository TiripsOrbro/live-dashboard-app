<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#53565d">
    <meta name="color-scheme" content="dark">
    <title>Page not found | TBA Dashboard</title>
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/styles/404.css">
</head>
<body class="not-found-page not-found-page--grey">
    <main class="not-found-stage">
        <div class="not-found-frame not-found-frame--grey">
            <img
                class="not-found-art"
                src="/images/core/404-grey.png"
                alt="404: Uh oh! Page not found. We can't seem to find the page you're looking for."

                height="682"
            >
            <div class="not-found-actions not-found-actions--below">
                <a class="not-found-home-btn" href="/">Go back to home</a>
            </div>
        </div>
    </main>
</body>
</html>
