<!DOCTYPE html>
<html lang="en" class="page-scroll">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#7a3eb1">
    <title>Area Dashboard</title>
    <script>
        try {
            if (sessionStorage.getItem('dashboard-nav-transition') === 'from-stores') {
                document.documentElement.className += ' page-nav-enter-pending';
            }
        } catch (e) { /* ignore */ }
    </script>
    <link rel="stylesheet" href="/styles/brand-mark.css">
    <link rel="stylesheet" href="/styles/dashboard.css">
    <link rel="stylesheet" href="/styles/page-transition.css">
    <link rel="stylesheet" href="/styles/nav-back.css">
    <link rel="stylesheet" href="/styles/mic.css">
    <link rel="stylesheet" href="/styles/page-scroll.css">
    <style>
        .sales-status {
            margin-bottom: 14px;
        }
        .area-grid-stack {
            display: grid;
            gap: 16px;
        }
        .area-grid-section {
            padding: 0;
        }
        .area-grid-section .dashboard-grid {
            overflow-x: auto;
            padding-bottom: 6px;
        }
        .area-grid-heading {
            margin: 0 0 calc(10px * var(--dashboard-scale));
            font-size: var(--font-size-3);
            font-weight: var(--font-weight-semibold);
            color: var(--charcoal);
            text-align: center;
        }
        .area-live-header {
            outline: 2px solid color-mix(in srgb, var(--tb-purple-light) 55%, var(--charcoal));
            outline-offset: -2px;
        }
        .area-page-tabs button.admin-area-tab {
            border: none;
            font: inherit;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
        }
        body.area-dashboard-page .dashboard-grid-footer {
            margin-top: 8px;
        }
        a.audit-chip {
            text-decoration: none;
        }
        @media (max-width: 900px) {
            .area-grid-section .dashboard-grid {
                grid-template-columns: minmax(120px, 0.9fr) repeat(var(--grid-hours, 12), minmax(88px, 1fr));
            }
        }
    </style>
</head>
<body class="area-dashboard-page">
    <div id="area-nav-back"></div>
    <script src="/scripts/brand-mark.js"></script>
    <div id="app">
        <div class="dashboard">
            <header class="dashboard-header">
                <div></div>
                <div class="dashboard-title">
                    <h1 id="title">AREA DASHBOARD</h1>
                    <p class="subtitle">Real-time area totals (timezone-adjusted)</p>
                    <nav class="admin-area-tabs area-page-tabs" id="area-tabs" aria-label="Select area"></nav>
                </div>
                <div class="top-info">
                    <div class="top-info-group">
                        <div class="top-info-label">Current Time</div>
                        <div id="time-display" class="top-info-value">--:--</div>
                    </div>
                    <div class="top-info-group">
                        <div class="top-info-label">Last updated</div>
                        <div id="last-updated" class="top-info-value">--:--</div>
                    </div>
                </div>
            </header>

            <div class="sales-status" id="status-banner" hidden></div>

            <div class="area-grid-stack" id="area-grids"></div>

            <div class="dashboard-grid-footer">
                <div class="dashboard-grid-footer-ledger">
                    <div class="dashboard-grid-footer-lead">
                        <div class="audits-aside" role="region" aria-label="Stores with audits outstanding">
                            <div class="audits-heading">List of Audits</div>
                            <div id="audits-list" class="audits-list" aria-live="polite"></div>
                        </div>
                    </div>
                    <p class="dashboard-colour-note">
                        Area view groups stores by timezone/state and sums forecast/actual by local trading hour.
                    </p>
                    <div class="dashboard-grid-footer-trail">
                        <div class="pending-vendors-aside" role="region" aria-label="Stores with orders outstanding">
                            <div class="pending-vendors-heading">Orders to place</div>
                            <div id="orders-list" class="pending-vendors-list" aria-live="polite"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/scripts/app-paths.js"></script>
    <script src="/scripts/page-transition.js"></script>
    <script src="/scripts/nav-back.js"></script>
    <script>
        DashboardNavBack?.mountBackButton(document.getElementById('area-nav-back'), {
            fallback: '/overview',
            alwaysFallback: true,
        });
    </script>
    <script>DashboardPageTransition.initEnterFade();</script>
    <script src="/scripts/area-dashboard.js"></script>
</body>
</html>
