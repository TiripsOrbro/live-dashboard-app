<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Live pulse, Taco Bell purple and gold">
  <defs>
    <radialGradient id="tb-bg" cx="50%" cy="38%" r="72%">
      <stop offset="0%" stop-color="#702082"/>
      <stop offset="55%" stop-color="#4a1258"/>
      <stop offset="100%" stop-color="#1a061f"/>
    </radialGradient>
    <linearGradient id="tb-ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#702082"/>
    </linearGradient>
    <linearGradient id="tb-pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8a820"/>
      <stop offset="50%" stop-color="#ffc72c"/>
      <stop offset="100%" stop-color="#ffe082"/>
    </linearGradient>
    <filter id="tb-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#tb-bg)"/>
  <circle cx="256" cy="256" r="184" fill="none" stroke="url(#tb-ring)" stroke-width="8" opacity="0.28"/>
  <circle cx="256" cy="256" r="148" fill="none" stroke="#9b4dca" stroke-width="5" opacity="0.42"/>
  <circle cx="256" cy="256" r="112" fill="none" stroke="#7a3eb1" stroke-width="3" opacity="0.35"/>
  <circle cx="256" cy="256" r="14" fill="#ffc72c"/>
  <circle cx="256" cy="256" r="7" fill="#fff8e1"/>
  <g filter="url(#tb-glow)">
    <path
      fill="none"
      stroke="url(#tb-pulse)"
      stroke-width="16"
      stroke-linecap="round"
      stroke-linejoin="round"
      d="M88 272 L160 272 L200 172 L256 328 L312 200 L360 272 L424 272"
    />
  </g>
</svg>
