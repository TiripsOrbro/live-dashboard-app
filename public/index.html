<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#7a3eb1">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TBADash">
    <title>Sales Dashboard</title>

    <!-- Styles -->
    <link rel="stylesheet" href="/styles/brand-mark.css">
    <link rel="stylesheet" href="/styles/dashboard.css">
    <link rel="stylesheet" href="/styles/login.css">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/icon.svg">
</head>

<body>
    <script src="/scripts/brand-mark.js"></script>
    <script src="/scripts/welcome-overlay.js"></script>
    <!-- Main App Container -->
    <div id="app">Loading dashboard...</div>

    <!-- Popup Container -->
    <div class="popup">
        <div class="popup-progress"></div>
        <div class="popup-inner">
            <div class="popup-icon"></div>
            <div class="popup-message"></div>
            <div class="popup-buttons">
                <button>Busy</button>
                <button>Quiet</button>
            </div>
        </div>
    </div>

    <!-- DEBUG: random notification popup test (disabled for production)
    <button id="popup-test-btn" type="button">DEBUG — Test popup</button>
    -->

    <!-- Popup Sound Effect -->
    <audio id="popup-sound" src="/assets/sounds/notification.mp3" preload="auto"></audio>

    <!-- Scripts -->
    <script src="/scripts/dashboard.js"></script>
</body>
</html>
