<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="color-scheme" content="dark">
    <title>Sign in — TBA Dashboard</title>
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/styles/brand-mark.css">
    <link rel="stylesheet" href="/styles/login.css">
</head>
<body class="login-body">
    <div class="login-root">
        <section id="login-stage" class="login-stage" aria-label="Sign in">
            <div id="login-card" class="login-card">
                <header class="login-brand">
                    <div class="login-brand-hero">
                        <div class="login-logo" id="login-brand-mark" role="img" aria-label="TBA Dashboard"></div>
                        <h1 class="login-title">TBA DASHBOARD</h1>
                    </div>
                    <p class="login-subtitle">Sign in to your store</p>
                </header>

                <div id="login-update-banner" class="login-update-banner" hidden role="status" aria-live="polite">
                    <p class="login-update-text">A dashboard update is ready.</p>
                    <button type="button" id="login-update-btn" class="login-update-btn">Update now</button>
                </div>

                <form id="login-form" class="login-form" novalidate>
                    <label class="login-field">
                        Username
                        <input id="login-username" name="username" type="text" autocomplete="username" autofocus>
                    </label>
                    <label class="login-field">
                        Password
                        <input id="login-password" name="password" type="password" autocomplete="current-password" required>
                    </label>
                    <label class="login-remember">
                        <input id="remember-me" name="remember" type="checkbox" checked>
                        <span>Stay signed in on this device</span>
                    </label>
                    <div id="login-actions" class="login-actions">
                        <button type="submit" class="login-submit login-submit--single" id="login-submit">
                            <span class="login-submit-label">Sign in</span>
                        </button>
                    </div>
                    <p id="login-error" class="login-error" role="alert" aria-live="polite"></p>
                </form>

                <footer class="login-account-footer">
                    <a class="login-link-btn" href="/Create-Account">Create account</a>
                </footer>
            </div>
            <p class="login-version" id="login-version" aria-live="polite"></p>
            <div id="login-progress" class="login-progress" role="progressbar" aria-label="Signing in" hidden>
                <div class="login-progress-track">
                    <div class="login-progress-bar"></div>
                </div>
            </div>
        </section>
    </div>

    <section id="welcome-stage" class="welcome-stage" hidden aria-hidden="true" aria-live="polite">
        <div class="welcome-stage-inner">
            <div class="welcome-brand" aria-hidden="true">
                <div class="welcome-logo" id="welcome-brand-mark" aria-hidden="true"></div>
            </div>
            <div class="welcome-copy">
                <p class="welcome-line">
                    <span id="welcome-message" class="welcome-message">Welcome</span>
                </p>
            </div>
        </div>
    </section>
    <script src="/scripts/brand-mark.js"></script>
    <script>
        (function () {
            function paint() {
                var host = document.getElementById('login-brand-mark');
                if (!host || !window.TbaBrandMark || !window.TbaBrandMark.svg) return;
                host.innerHTML = window.TbaBrandMark.svg('login-mark');
            }
            if (window.TbaBrandMark) paint();
            else document.querySelector('script[src="/scripts/brand-mark.js"]')?.addEventListener('load', paint);
        })();
        const params = new URLSearchParams(window.location.search);
        if (params.get('created') === '1') {
            const err = document.getElementById('login-error');
            if (err) {
                err.style.color = 'var(--tb-purple-light)';
                err.textContent = 'Account created. Sign in with your new username.';
            }
        }
    </script>
    <script src="/scripts/dashboard-meta.js"></script>
    <script src="/scripts/login.js"></script>
</body>
</html>
