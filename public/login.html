<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#7a3eb1">
    <title>Sign in — Sales Dashboard</title>
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/styles/login.css">
</head>
<body class="login-body">
    <div class="login-root">
        <section id="login-stage" class="login-stage" aria-label="Sign in">
            <div class="login-card">
                <header class="login-brand">
                    <h1 class="login-title">SALES DASHBOARD</h1>
                    <p class="login-subtitle">Sign in to view live store data</p>
                </header>

                <form id="login-form" class="login-form" novalidate>
                    <label class="login-field">
                        Username
                        <input id="login-username" name="username" type="text" autocomplete="username" autofocus>
                    </label>
                    <label class="login-field">
                        Password
                        <input id="login-password" name="password" type="password" autocomplete="current-password" required>
                    </label>
                    <button type="submit" class="login-submit" id="login-submit">Sign in</button>
                    <p id="login-error" class="login-error" role="alert" aria-live="polite"></p>
                </form>
            </div>
        </section>

        <section id="welcome-stage" class="welcome-stage" hidden aria-hidden="true" aria-live="polite">
            <div class="welcome-copy">
                <p class="welcome-line">
                    <span id="welcome-label" class="welcome-label">Welcome</span>
                </p>
                <p class="welcome-line welcome-line--name" id="welcome-name-row" hidden>
                    <span class="welcome-name-wrap"><span id="welcome-name"></span></span>
                </p>
            </div>
        </section>
    </div>
    <script src="/scripts/login.js"></script>
</body>
</html>
