<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#7a3eb1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Store Dashboards</title>

    <link rel="stylesheet" href="/styles/dashboard.css">
    <link rel="stylesheet" href="/styles/login.css">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/icon.svg">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: max(4vh, env(safe-area-inset-top)) max(4vw, env(safe-area-inset-right))
                max(4vh, env(safe-area-inset-bottom)) max(4vw, env(safe-area-inset-left));
            box-sizing: border-box;
        }

        .stores-header {
            text-align: center;
            margin-bottom: 4vh;
            width: 100%;
            max-width: 520px;
        }

        .stores-greeting {
            margin: 0 0 0.35rem;
            font-size: var(--font-size-4);
            font-weight: var(--font-weight-medium);
            color: color-mix(in srgb, var(--charcoal) 82%, var(--grey));
        }

        .stores-header-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 0.75rem 1.25rem;
        }

        .stores-title {
            font-size: var(--font-size-1);
            font-weight: var(--font-weight-page-title);
            color: var(--charcoal);
            margin: 0;
        }

        .stores-subtitle {
            font-size: var(--font-size-4);
            font-weight: var(--font-weight-subtitle);
            color: color-mix(in srgb, var(--charcoal) 70%, var(--grey));
            margin: 0.5rem 0 0;
        }

        .stores-logout {
            margin: 0.75rem 0 0;
            font-size: var(--font-size-5);
        }

        .stores-logout a {
            color: var(--tb-purple-light);
            font-weight: var(--font-weight-semibold);
        }

        .store-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: clamp(12px, 2vw, 24px);
            width: 100%;
            max-width: 1200px;
        }

        .store-tile {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            padding: clamp(20px, 3vw, 36px) 16px;
            background: var(--charcoal);
            color: var(--white);
            border: 2px solid var(--dark-purple-border);
            border-radius: 14px;
            text-decoration: none;
            transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
        }

        .store-tile:hover,
        .store-tile:focus-visible {
            transform: translateY(-3px);
            border-color: var(--tb-purple-light);
            background: color-mix(in srgb, var(--tb-purple-light) 18%, var(--charcoal));
            outline: none;
        }

        .store-tile-number {
            font-size: var(--font-size-1);
            font-weight: var(--font-weight-heavy);
            line-height: 1;
        }

        .store-tile-name {
            font-size: var(--font-size-4);
            font-weight: var(--font-weight-medium);
            text-align: center;
            color: color-mix(in srgb, var(--white) 82%, var(--charcoal));
        }

        .store-tile-hours {
            font-size: var(--font-size-5);
            font-weight: var(--font-weight-normal);
            color: color-mix(in srgb, var(--white) 60%, var(--charcoal));
        }

        .stores-message {
            font-size: var(--font-size-3);
            color: var(--charcoal);
            text-align: center;
            margin-top: 6vh;
        }

        @media (max-width: 900px) {
            body {
                padding: max(3vh, env(safe-area-inset-top)) max(4vw, env(safe-area-inset-right))
                    max(3vh, env(safe-area-inset-bottom)) max(4vw, env(safe-area-inset-left));
            }

            .store-grid {
                grid-template-columns: 1fr;
                gap: 10px;
                max-width: 520px;
            }

            .store-tile {
                flex-direction: row;
                align-items: center;
                justify-content: flex-start;
                gap: 12px;
                padding: 14px 16px;
                min-height: 0;
                border-radius: 10px;
            }

            .store-tile-number {
                font-size: 1.25rem;
                min-width: 3.25rem;
                flex-shrink: 0;
            }

            .store-tile-name {
                font-size: var(--font-size-4);
                text-align: left;
                flex: 1 1 auto;
            }

            .store-tile-hours {
                flex-shrink: 0;
                margin-left: auto;
                font-size: 0.85rem;
            }
        }
    </style>
</head>

<body>
    <script src="/scripts/welcome-overlay.js"></script>
    <header class="stores-header">
        <p id="stores-greeting" class="stores-greeting" hidden></p>
        <div class="stores-header-row">
            <div>
                <h1 class="stores-title">Store Dashboards</h1>
                <p class="stores-subtitle">Select a store to open its live sales dashboard</p>
            </div>
            <p class="stores-logout"><a href="/logout">Sign out</a></p>
        </div>
    </header>

    <main id="store-grid" class="store-grid" aria-label="Store list"></main>

    <script src="/scripts/stores.js"></script>
</body>
</html>
