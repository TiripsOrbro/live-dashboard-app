<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#7a3eb1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Store Dashboards</title>

    <link rel="stylesheet" href="/styles/dashboard.css">
    <link rel="stylesheet" href="/styles/brand-mark.css">
    <link rel="stylesheet" href="/styles/login.css">
    <link rel="stylesheet" href="/styles/page-transition.css">
    <link rel="stylesheet" href="/styles/nav-back.css">
    <script>
        try {
            if (sessionStorage.getItem('dashboard-nav-transition') === 'from-dashboard') {
                document.documentElement.classList.add('page-nav-enter-pending');
            }
        } catch (e) { /* ignore */ }
    </script>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/icon.svg">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: max(4vh, env(safe-area-inset-top)) max(4vw, env(safe-area-inset-right))
                max(4vh, env(safe-area-inset-bottom)) max(4vw, env(safe-area-inset-left));
            box-sizing: border-box;
        }

        .stores-header {
            text-align: center;
            margin-bottom: 4vh;
            width: 100%;
            max-width: 520px;
        }

        .stores-top-bar {
            position: fixed;
            top: max(12px, env(safe-area-inset-top));
            right: max(12px, env(safe-area-inset-right));
            left: auto;
            z-index: 10;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            pointer-events: none;
        }

        .stores-sign-out-btn {
            pointer-events: auto;
            position: static;
            font: inherit;
            font-size: var(--font-size-5);
            font-weight: var(--font-weight-semibold);
            padding: 8px 14px;
            cursor: pointer;
            border: 1px solid var(--dark-purple-border);
            background: var(--charcoal);
            color: var(--white);
            border-radius: 8px;
            text-decoration: none;
            transition: background 0.15s ease, border-color 0.15s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .stores-sign-out-btn:hover,
        .stores-sign-out-btn:focus-visible {
            background: color-mix(in srgb, var(--tb-purple-light) 22%, var(--charcoal));
            border-color: var(--tb-purple-light);
            outline: none;
        }

        .stores-greeting {
            margin: 0 0 0.35rem;
            font-size: var(--font-size-4);
            font-weight: var(--font-weight-medium);
            color: color-mix(in srgb, var(--charcoal) 82%, var(--grey));
        }

        .stores-title {
            font-size: var(--font-size-1);
            font-weight: var(--font-weight-page-title);
            color: var(--charcoal);
            margin: 0;
        }

        .stores-subtitle {
            font-size: var(--font-size-4);
            font-weight: var(--font-weight-subtitle);
            color: color-mix(in srgb, var(--charcoal) 70%, var(--grey));
            margin: 0.5rem 0 0;
        }

        .store-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: clamp(16px, 2.2vw, 28px);
            width: 100%;
            max-width: 1200px;
        }

        .group-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: clamp(10px, 1.5vw, 16px);
            width: 100%;
            align-items: start;
        }

        .group-grid.area-focus-active {
            align-items: start;
            justify-items: stretch;
        }

        :root {
            --area-expand-duration: 1.05s;
            --area-title-shift-duration: 0.38s;
            --area-stores-delay: 0.48s;
            --area-stores-fade-duration: 0.42s;
            --clip-left: 0px;
            --clip-right: 0px;
            --clip-bottom: calc(100% - 190px);
        }

        .area-tile-card {
            margin: 0;
            display: block;
        }

        .area-tile-summary {
            list-style: none;
            cursor: pointer;
            display: block;
        }

        .area-tile-summary::-webkit-details-marker {
            display: none;
        }

        .area-tile {
            width: 100%;
            box-sizing: border-box;
            user-select: none;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.55rem;
            min-height: 190px;
        }

        .group-grid > .store-tile {
            min-height: 190px;
        }

        .area-tile-topline {
            position: absolute;
            top: 10px;
            left: 12px;
            display: flex;
            justify-content: flex-start;
            width: auto;
            min-height: 0;
        }

        .area-return-btn {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.55s ease;
            border: none;
            background: none;
            color: var(--white);
            border-radius: 0;
            padding: 0;
            font: inherit;
            font-size: var(--font-size-5);
            font-weight: var(--font-weight-semibold);
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 0.18em;
        }

        .area-tile-card.is-expanding-wide .area-return-btn,
        .area-tile-card.is-expanding-down .area-return-btn,
        .area-tile-card.is-revealed[open] .area-return-btn {
            opacity: 1;
            pointer-events: auto;
        }

        .area-tile-card.is-closing .area-return-btn {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.28s ease;
        }

        .group-item {
            transition: opacity 0.5s ease;
        }

        .group-grid.area-focus-active .group-item.is-dimmed {
            display: none;
        }

        .group-grid.area-focus-active .group-item.is-selected {
            grid-column: 1 / -1;
            z-index: 2;
            width: 100%;
            box-sizing: border-box;
        }

        .area-tile-card[open] {
            border: 2px solid var(--tb-purple-light);
            border-radius: 14px;
            background: color-mix(in srgb, var(--tb-purple-light) 18%, var(--charcoal));
            overflow: hidden;
        }

        /* Start at the original tile footprint, then expand out + down together. */
        .area-tile-card[open].is-opening:not(.is-expanding-wide) {
            clip-path: inset(0 var(--clip-right) var(--clip-bottom) var(--clip-left) round 14px);
        }

        .area-tile-card[open].is-opening.is-expanding-wide,
        .area-tile-card[open].is-revealed {
            clip-path: inset(0 0 0 0 round 14px);
        }

        .area-tile-card[open].is-opening.is-expanding-wide {
            transition: clip-path var(--area-expand-duration) cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* Reverse expand: same clip transition, run from full → tile footprint. */
        .area-tile-card[open].is-closing {
            transition: clip-path var(--area-expand-duration) cubic-bezier(0.22, 1, 0.36, 1);
        }

        .area-tile-card[open].is-closing.is-collapsing-wide {
            clip-path: inset(0 0 0 0 round 14px);
        }

        .area-tile-card[open].is-closing:not(.is-collapsing-wide) {
            clip-path: inset(0 var(--clip-right) var(--clip-bottom) var(--clip-left) round 14px);
        }

        .area-tile-card.is-closing[open] .area-tile-panel {
            padding: clamp(12px, 2vw, 18px);
            max-height: 1600px;
            opacity: 1;
        }

        .area-tile-card[open] .area-tile {
            border-color: transparent;
            background: transparent;
            border-radius: 0;
            min-height: 140px;
        }

        .area-tile-panel {
            margin: 0;
            background: transparent;
            border: none;
            border-radius: 0;
            padding: 0 clamp(12px, 2vw, 18px);
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }

        .area-tile-card.is-expanding-wide[open] .area-tile-panel,
        .area-tile-card.is-expanding-down[open] .area-tile-panel,
        .area-tile-card.is-revealed[open] .area-tile-panel {
            padding: clamp(12px, 2vw, 18px);
            max-height: 1600px;
            opacity: 1;
        }

        .area-tile-title {
            font-size: var(--font-size-1);
            font-weight: var(--font-weight-heavy);
            line-height: 1.2;
            color: color-mix(in srgb, var(--white) 90%, var(--charcoal));
        }

        .area-tile-store-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: clamp(10px, 1.5vw, 16px);
        }

        .area-tile-store-grid .store-tile {
            opacity: 0;
            transform: scale(0.965);
            transition:
                opacity var(--area-stores-fade-duration) ease,
                transform var(--area-stores-fade-duration) cubic-bezier(0.22, 1, 0.36, 1);
        }

        .area-tile-card.is-stores-revealed .area-tile-store-grid .store-tile {
            opacity: 1;
            transform: scale(1);
        }

        @media (prefers-reduced-motion: reduce) {
            .area-tile-store-grid .store-tile {
                opacity: 1;
                transform: none;
                transition: none;
            }
        }

        .area-tile-panel .store-tile {
            background: color-mix(in srgb, var(--white) 96%, var(--grey));
            color: var(--charcoal);
            border-color: color-mix(in srgb, var(--charcoal) 12%, var(--white));
        }

        .area-tile-panel .store-tile:hover,
        .area-tile-panel .store-tile:focus-visible {
            background: var(--white);
            border-color: var(--tb-purple-light);
            color: var(--charcoal);
        }

        .area-tile-panel .store-tile-number {
            color: var(--charcoal);
        }

        .area-tile-panel .store-tile-name {
            color: color-mix(in srgb, var(--charcoal) 88%, var(--grey));
        }

        .area-tile-panel .store-tile-hours {
            color: color-mix(in srgb, var(--charcoal) 55%, var(--grey));
        }

        .area-tile-panel .store-tile--area-dashboard {
            background: color-mix(in srgb, var(--tb-purple-light) 22%, var(--white));
            border-color: var(--tb-purple-light);
            color: var(--charcoal);
        }

        .area-tile-panel .store-tile--area-dashboard .store-tile-name,
        .area-tile-panel .store-tile--area-dashboard .store-tile-number {
            color: var(--charcoal);
        }

        .store-tile {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            padding: clamp(20px, 3vw, 36px) 16px;
            background: var(--charcoal);
            color: var(--white);
            border: 2px solid var(--dark-purple-border);
            border-radius: 14px;
            text-decoration: none;
            transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
        }

        .store-tile:hover,
        .store-tile:focus-visible {
            transform: translateY(-3px);
            border-color: var(--tb-purple-light);
            background: color-mix(in srgb, var(--tb-purple-light) 18%, var(--charcoal));
            outline: none;
        }

        .store-tile-number {
            font-size: var(--font-size-1);
            font-weight: var(--font-weight-heavy);
            line-height: 1;
        }

        .store-tile-name {
            font-size: var(--font-size-4);
            font-weight: var(--font-weight-medium);
            text-align: center;
            color: color-mix(in srgb, var(--white) 82%, var(--charcoal));
        }

        .area-tile .area-tile-title {
            font-size: var(--font-size-1);
            font-weight: var(--font-weight-heavy);
            line-height: 1.1;
            color: color-mix(in srgb, var(--white) 94%, var(--charcoal));
            max-width: 100%;
            transition: transform var(--area-title-shift-duration) cubic-bezier(0.4, 0, 1, 1);
        }

        /* Keep the area label over the original tile column while the card clip shrinks. */
        .area-tile-card[open].is-opening:not(.is-expanding-wide) .area-tile-title {
            transform: translateX(calc((var(--clip-left, 0px) - var(--clip-right, 0px)) / 2));
            transition-duration: 0s;
        }

        .area-tile-card[open].is-opening.is-expanding-wide .area-tile-title,
        .area-tile-card[open].is-revealed .area-tile-title {
            transform: translateX(0);
            transition-duration: var(--area-expand-duration);
            transition-timing-function: cubic-bezier(0.22, 1, 0.36, 1);
        }

        .area-tile-card[open].is-closing.is-collapsing-wide .area-tile-title {
            transform: translateX(0);
            transition-duration: 0s;
        }

        .area-tile-card[open].is-closing:not(.is-collapsing-wide) .area-tile-title {
            transform: translateX(calc((var(--clip-left, 0px) - var(--clip-right, 0px)) / 2));
            transition-duration: var(--area-title-shift-duration);
            transition-timing-function: cubic-bezier(0.4, 0, 1, 1);
        }

        @media (prefers-reduced-motion: reduce) {
            .area-tile .area-tile-title {
                transition: none;
                transform: none;
            }
        }

        .store-tile-hours {
            font-size: var(--font-size-5);
            font-weight: var(--font-weight-normal);
            color: color-mix(in srgb, var(--white) 60%, var(--charcoal));
        }

        .store-tile--test {
            border-style: dashed;
            background: color-mix(in srgb, var(--tb-purple-light) 12%, var(--charcoal));
        }

        .store-tile--area-dashboard {
            background: color-mix(in srgb, var(--tb-purple-light) 28%, var(--charcoal));
            border-color: var(--tb-purple-light);
        }

        .store-tile--empty-area {
            border-style: dashed;
            opacity: 0.85;
            cursor: default;
            pointer-events: none;
        }

        .stores-message {
            font-size: var(--font-size-3);
            color: var(--charcoal);
            text-align: center;
            margin-top: 6vh;
        }

        @media (max-width: 900px) {
            body {
                padding: max(3vh, env(safe-area-inset-top)) max(4vw, env(safe-area-inset-right))
                    max(3vh, env(safe-area-inset-bottom)) max(4vw, env(safe-area-inset-left));
            }

            .store-grid {
                gap: 10px;
                max-width: 520px;
            }

            .group-grid,
            .area-tile-store-grid {
                grid-template-columns: 1fr;
                gap: 8px;
            }

            .store-tile {
                flex-direction: row;
                align-items: center;
                justify-content: flex-start;
                gap: 12px;
                padding: 14px 16px;
                min-height: 0;
                border-radius: 10px;
                min-height: 0;
            }

            .store-tile-number {
                font-size: 1.25rem;
                min-width: 3.25rem;
                flex-shrink: 0;
            }

            .store-tile-name {
                font-size: var(--font-size-4);
                text-align: left;
                flex: 1 1 auto;
            }

            .store-tile-hours {
                flex-shrink: 0;
                margin-left: auto;
                font-size: 0.85rem;
            }
        }
    </style>
</head>

<body>
    <script src="/scripts/brand-mark.js"></script>
    <script src="/scripts/page-transition.js"></script>
    <script src="/scripts/welcome-overlay.js"></script>
    <div class="nav-back-host" id="stores-nav-back"></div>
    <div class="stores-top-bar">
        <a href="/logout" class="stores-sign-out-btn">Sign out</a>
    </div>
    <header class="stores-header">
        <p id="stores-greeting" class="stores-greeting" hidden></p>
        <h1 class="stores-title">Store Dashboards</h1>
        <p class="stores-subtitle">Select a store to open its live sales dashboard</p>
    </header>

    <main id="store-grid" class="store-grid" aria-label="Store list"></main>

    <script src="/scripts/app-paths.js"></script>
    <script src="/scripts/nav-back.js"></script>
    <script src="/scripts/stores.js"></script>
    <script>
        DashboardNavBack?.mountBackButton(document.getElementById('stores-nav-back'), {
            fallback: '/Admin/Overview',
            alwaysFallback: true,
        });
        DashboardPageTransition.installStoreLinkFade(document);
        DashboardPageTransition.initStoresEnterFade();
    </script>
</body>
</html>
