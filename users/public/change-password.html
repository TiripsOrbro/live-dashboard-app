<!DOCTYPE html>
<html lang="en" class="page-scroll">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="color-scheme" content="dark">
    <title>Set your password - TBA Dashboard</title>
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/styles/brand-mark.css">
    <link rel="stylesheet" href="/styles/login.css">
    <link rel="stylesheet" href="/styles/page-scroll.css">
</head>
<body class="login-body">
    <div class="login-root">
        <section id="login-stage" class="login-stage" aria-label="Set password">
            <div id="login-card" class="login-card">
                <header class="login-brand">
                    <div class="login-brand-hero">
                        <div class="login-logo" id="login-brand-mark" role="img" aria-label="TBA Dashboard"></div>
                        <h1 class="login-title">Set your password</h1>
                    </div>
                    <p class="login-subtitle" id="change-password-intro">Choose a new password before continuing.</p>
                </header>

                <form id="change-password-form" class="login-form" novalidate>
                    <p id="password-policy" class="login-policy" role="note"></p>
                    <label class="login-field">
                        Current (temporary) password
                        <input id="current-password" name="currentPassword" type="password" autocomplete="current-password" required>
                    </label>
                    <label class="login-field">
                        New password
                        <input id="new-password" name="newPassword" type="password" autocomplete="new-password" required>
                    </label>
                    <label class="login-field">
                        Confirm new password
                        <input id="confirm-password" name="confirmPassword" type="password" autocomplete="new-password" required>
                    </label>
                    <div class="login-actions">
                        <button type="submit" class="login-submit login-submit--single" id="change-password-submit">
                            <span class="login-submit-label">Save password</span>
                        </button>
                    </div>
                    <p id="change-password-error" class="login-error" role="alert" aria-live="polite"></p>
                </form>
            </div>
        </section>
    </div>
    <script src="/scripts/brand-mark.js"></script>
    <script src="/scripts/change-password.js"></script>
</body>
</html>
