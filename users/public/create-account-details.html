<!DOCTYPE html>
<html lang="en" class="page-scroll">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>Create account — Step 2 — TBA Dashboard</title>
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/styles/brand-mark.css">
    <link rel="stylesheet" href="/styles/login.css">
    <link rel="stylesheet" href="/styles/nav-back.css">
    <link rel="stylesheet" href="/styles/page-scroll.css">
</head>
<body class="login-body">
    <div class="login-root">
        <section class="login-stage">
            <div class="login-card">
                <div class="nav-back-host" id="create-details-back"></div>
                <header class="login-brand">
                    <div class="login-brand-hero">
                        <div class="login-logo" id="login-brand-mark"></div>
                        <h1 class="login-title">NEW ACCOUNT</h1>
                    </div>
                    <p class="login-subtitle">Step 2 — Choose access level and sign-in details</p>
                </header>
                <form id="create-account-form" class="login-form" novalidate>
                    <p class="login-section-label">Access level</p>
                    <div class="login-field">
                        <div id="new-account-level-group" class="login-choice-group login-choice-group--levels" role="radiogroup" aria-label="Access level"></div>
                    </div>
                    <div id="create-scope-stack" class="create-scope-stack"></div>

                    <hr class="login-divider">

                    <p class="login-section-label">Dashboard sign-in</p>
                    <label class="login-field">
                        New username
                        <input id="new-username" name="username" type="text" autocomplete="username" required>
                    </label>
                    <p class="login-path-card-desc" style="margin: 0;">
                        A temporary password will be generated automatically. Share it with the new user — they must complete setup on first sign-in.
                    </p>

                    <div id="create-details-success" hidden>
                        <hr class="login-divider">
                        <p class="login-section-label">Temporary password</p>
                        <p class="login-path-card-desc" style="margin: 0 0 0.5rem;">
                            Copy this now. It will not be shown again.
                        </p>
                        <p id="create-temp-password" class="login-temp-password"></p>
                        <p id="create-details-next-steps" class="login-path-card-desc" style="margin: 0.75rem 0 0;"></p>
                    </div>

                    <button type="submit" class="login-submit" id="create-account-submit">Create account</button>
                    <p id="create-details-error" class="login-error" role="alert"></p>
                    <p id="create-details-status" class="login-error" style="color: var(--login-text-muted);" hidden></p>
                </form>
            </div>
        </section>
    </div>
    <script src="/scripts/brand-mark.js"></script>
    <script src="/scripts/nav-back.js"></script>
    <script src="/scripts/create-account-details.js"></script>
</body>
</html>
