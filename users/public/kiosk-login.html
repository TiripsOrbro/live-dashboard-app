<!DOCTYPE html>
<html lang="en" class="page-scroll">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>Kiosk sign in — TBA Dashboard</title>
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/styles/brand-mark.css">
    <link rel="stylesheet" href="/styles/login.css">
    <link rel="stylesheet" href="/styles/nav-back.css">
    <link rel="stylesheet" href="/styles/page-scroll.css">
</head>
<body class="login-body">
    <div class="login-root">
        <section class="login-stage">
            <div class="login-card">
                <div class="nav-back-host" id="kiosk-login-back"></div>
                <header class="login-brand">
                    <div class="login-brand-hero">
                        <div class="login-logo" id="login-brand-mark"></div>
                        <h1 class="login-title">KIOSK</h1>
                    </div>
                    <p class="login-subtitle">Store sales dashboard only</p>
                </header>
                <form id="kiosk-login-form" class="login-form" novalidate>
                    <label class="login-field">
                        Username
                        <input id="kiosk-username" name="username" type="text" autocomplete="username" autofocus>
                    </label>
                    <label class="login-field">
                        Password
                        <input id="kiosk-password" name="password" type="password" autocomplete="current-password" required>
                    </label>
                    <label class="login-remember">
                        <input id="kiosk-remember" type="checkbox" checked>
                        <span>Stay signed in on this device</span>
                    </label>
                    <button type="submit" class="login-submit" id="kiosk-submit">Sign in to dashboard</button>
                    <p id="kiosk-login-error" class="login-error" role="alert"></p>
                </form>
            </div>
        </section>
    </div>
    <script src="/scripts/brand-mark.js"></script>
    <script src="/scripts/nav-back.js"></script>
    <script>
        sessionStorage.removeItem('dashboard-entry');
    </script>
    <script src="/scripts/kiosk-login.js"></script>
</body>
</html>
